<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitLurker</title>
    <meta
      name="description"
      content="Passive index of open-source GitHub activity on Nostr."
    />

    <meta property="og:type" content="website" />
    <meta id="meta-og-title" property="og:title" content="GitLurker" />
    <meta
      id="meta-og-desc"
      property="og:description"
      content="Passive index of open-source GitHub activity on Nostr."
    />
    <meta id="meta-og-url" property="og:url" content="" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta id="meta-tw-title" name="twitter:title" content="GitLurker" />
    <meta
      id="meta-tw-desc"
      name="twitter:description"
      content="Passive index of open-source GitHub activity on Nostr."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <script type="application/ld+json" id="jsonld-placeholder">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "GitLurker",
        "description": "Project index over Nostr"
      }
    </script>

    <link rel="icon" href="/og-image.png" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="site-header">
        <nav class="nav-bar" aria-label="Primary">
          <a class="brand" data-spa href="/">
            <img
              class="brand-logo"
              src="/og-image.png"
              width="36"
              height="36"
              alt=""
            />
            <span class="brand-title">GitLurker</span>
          </a>
          <div class="nav-links nav-links--desktop">
            <a data-spa href="/">Home</a>
            <a data-spa href="/about">About</a>
          </div>
          <div id="theme-slot" class="theme-slot theme-slot--desktop"></div>
          <button
            type="button"
            id="nav-menu-btn"
            class="nav-menu-btn"
            aria-expanded="false"
            aria-controls="mobile-nav-drawer"
            aria-label="Open menu"
          >
            <span class="nav-menu-icon" aria-hidden="true"></span>
          </button>
        </nav>
        <div id="mobile-nav-drawer" class="mobile-nav-drawer" hidden>
          <button
            type="button"
            class="mobile-nav-backdrop"
            tabindex="-1"
            aria-label="Close menu"
          ></button>
          <div class="mobile-nav-panel">
            <div id="theme-slot-drawer" class="mobile-nav-theme"></div>
            <nav class="mobile-nav-links" aria-label="Mobile">
              <a data-spa href="/">Home</a>
              <a data-spa href="/about">About</a>
            </nav>
          </div>
        </div>
      </header>

      <main id="main-outlet" class="main-outlet"></main>

      <footer class="site-footer">
        <p class="muted">
          Data from Nostr relays and GitHub. Not affiliated with GitHub.
        </p>
      </footer>
    </div>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
